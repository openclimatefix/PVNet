_target_: pvnet.models.multimodal.multimodal.Model

output_quantiles: [0.5]

#--------------------------------------------
# NWP encoder
#--------------------------------------------

nwp_encoders_dict:
  ukv:
    _target_: pvnet.models.multimodal.encoders.encoders3d.DefaultPVNet
    _partial_: True
    in_channels: 11
    out_features: 256 # 
    number_of_conv3d_layers: 6
    conv3d_channels: 32 
    image_size_pixels: 24
  ecmwf:
    _target_: pvnet.models.multimodal.encoders.encoders3d.DefaultPVNet
    _partial_: True
    in_channels: 12
    out_features: 256 
    number_of_conv3d_layers: 4
    conv3d_channels: 32 
    image_size_pixels: 12


#--------------------------------------------
# Sat encoder settings
#--------------------------------------------

sat_encoder:
  _target_: pvnet.models.multimodal.encoders.encoders3d.ResConv3DNet2
  _partial_: True
  in_channels: 11
  out_features: 256
  image_size_pixels: 24
  hidden_channels: 32
  n_res_blocks: 3
  res_block_layers: 3
  batch_norm: true
  dropout_frac: 0.0
 
#--------------------------------------------
# PV encoder settings
#--------------------------------------------

pv_encoder:
  _target_: pvnet.models.multimodal.site_encoders.encoders.SingleAttentionNetwork
  _partial_: True
  num_sites: 1
  out_features: 40
  num_heads: 4
  kdim: 40
  id_embed_dim: 20
  target_id_dim: 19
  input_key_to_use: "pv"

#--------------------------------------------
# Tabular network settings
#--------------------------------------------

output_network:
  _target_: pvnet.models.multimodal.linear_networks.networks.ResFCNet2
  _partial_: True
  fc_hidden_features: 128
  n_res_blocks: 6
  res_block_layers: 2
  dropout_frac: 0.0

embedding_dim: 16 # usuaully 16
include_sun: True
include_gsp_yield_history: False

#--------------------------------------------
# Times
#--------------------------------------------

# Foreast and time settings
forecast_minutes: 2160
history_minutes: 120

min_sat_delay_minutes: 60

# These must also be set even if identical to forecast_minutes and  history_minutes
sat_history_minutes: 90
pv_history_minutes: 120
pv_interval_minutes: 30

# These must be set for each NWP encoder
nwp_history_minutes:
  ukv: 120
  ecmwf: 120
nwp_forecast_minutes:
  ukv: 1800
  ecmwf: 1980

# ----------------------------------------------
# Optimizer
# ----------------------------------------------
optimizer:
  _target_: pvnet.optimizers.EmbAdamWReduceLROnPlateau
  lr: 0.0001
  weight_decay: 0.25
  amsgrad: True
  patience: 5
  factor: 0.1
  threshold: 0.002


adapt_batches: True
target_key: "pv"
num_embeddings: 20
