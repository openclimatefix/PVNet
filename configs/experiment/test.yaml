# @package _global_

# to execute this experiment run:
# python run.py experiment=test.yaml

defaults:
  - _self_
  - trainer: default.yaml
  - model: multimodal.yaml
  - datamodule: premade_batches.yaml
  - callbacks: default.yaml # set this to null if you don't want to use callbacks
  - logger: wandb.yaml # set logger here or use command line (e.g. `python run.py logger=wandb`)
  - experiment: null
  - hparams_search: conv3d_optuna.yaml
  - hydra: default.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

seed: 518

trainer:
  min_epochs: 1
  max_epochs: 1
  reload_dataloaders_every_n_epochs: 0
  limit_train_batches: 500
  limit_val_batches: 100
  val_check_interval: 100
  num_sanity_val_steps: 8
  accumulate_grad_batches: 4
  #fast_dev_run: 3

# datamodule:
#   num_workers: 10
#   prefetch_factor: 2
#   batch_size: 8
#validate_only: '1'  # by putting this key in the config file, the model does not get trained.
