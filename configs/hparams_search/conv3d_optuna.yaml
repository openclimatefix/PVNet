# @package _global_

# example hyperparameter optimization of some experiment with Optuna:
# python run.py -m hparams_search=conv3d_optuna experiment=conv3d_sat_nwp

defaults:
  - override /hydra/sweeper: optuna
  # - override /hydra/launcher: joblib #enables multiple jobs running at the same time?

# choose metric which will be optimized by Optuna
optimized_metric: "MAE/val"

hydra:
  # here we define Optuna hyperparameter search
  # it optimizes for value returned from function with @hydra.main decorator
  # learn more here: https://hydra.cc/docs/next/plugins/optuna_sweeper
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    storage: sqlite:////home/sukhil/ocf-code/PVNet/10_hparam_runs.db
    study_name: uk_pv_hyperparameters_10_runs
    # study_name: uk_pv_hyperparameters_1 
    
    n_jobs: 1

    # 'minimize' or 'maximize' the objective
    direction: minimize

    # number of experiments that will be executed
    n_trials: 10
    # n_trials: 6


    # choose Optuna hyperparameter sampler
    # learn more here: https://optuna.readthedocs.io/en/stable/reference/samplers.html
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 12345
      consider_prior: true
      prior_weight: 1.0
      consider_magic_clip: true
      consider_endpoints: false
      n_startup_trials: 10
      n_ei_candidates: 24
      multivariate: false
      warn_independent_sampling: true

    # define range of hyperparameters
    params:
      model.nwp_encoders_dict.ecmwf.conv3d_channels: 'choice(32, 64, 128, 256)'
      model.nwp_encoders_dict.ecmwf.out_features: 'choice(64, 128, 256, 512)'
      model.nwp_encoders_dict.ukv.conv3d_channels: 'choice(32, 64, 128, 256)'
      model.nwp_encoders_dict.ukv.out_features: 'choice(64, 128, 256, 512)'
      model.optimizer.weight_decay: 'choice(0.35, 0.3, 0.25, 0.2, 0.15, 0.1)'
      # model.nwp_encoders_dict.ecmwf.number_of_conv3d_layers: 'choice(4, 5)'
      # model.nwp_encoders_dict.ecmwf._target_: 'choice(pvnet.models.multimodal.encoders.encoders3d.DefaultPVNet, pvnet.models.multimodal.encoders.encoders3d.ResConv3DNet2)'
      # model.nwp_encoders_dict.ecmwf.number_of_conv3d_layers: 'choice(2, 3, 4, 5, 6, 7)'
      # model.nwp_encoders_dict.ecmwf.conv3d_channels: 'choice(16, 32, 64, 128, 256)'
      # model.nwp_encoders_dict.ecmwf.out_features: 'choice(16, 32, 64, 128, 256)'
      #model.output_network.fc_hidden_features: 'choice(16, 32, 64, 128, 256, 512)'
      #model.output_network.n_res_blocks: 'choice(2, 3, 4, 5, 6)'
      #model.output_network.res_block_layers: 'choice(2, 3, 4)'
      # model.embedding_dim: 'choice(16, 32, 64, 128, 256)'
      #model.include_sun: 'choice(true, false)'

#model.nwp_encoders_dict.ecmwf.number_of_conv3d_layers: 2
#model.nwp_encoders_dict.ecmwf.conv3d_channels: 32
#model.nwp_encoders_dict.ecmwf.out_features: 256
#model.output_network.fc_hidden_features: 16
#model.output_network.n_res_blocks: 2
#model.output_network.res_block_layers: 2
#model.embedding_dim: 16
#model.include_sun: false



