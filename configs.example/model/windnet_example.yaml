# Foreast and time settings
forecast_minutes: 2880
history_minutes: 60

min_sat_delay_minutes: 60

# --- set to null if same as history_minutes ---
sat_history_minutes: 90
nwp_history_minutes:
  ecmwf: 60
#  excarta: 60
nwp_forecast_minutes:
  ecmwf: 2880
#  excarta: 2160
wind_history_minutes: 60
sensor_interval_minutes: 15

target_key: "wind"
