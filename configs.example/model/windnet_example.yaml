  num_heads: 4
  kdim: 128
  id_embed_dim: 128

#--------------------------------------------
# Tabular network settings
#--------------------------------------------

output_network:
  _target_: pvnet.models.multimodal.linear_networks.networks.ResFCNet2
  _partial_: True
  fc_hidden_features: 1024
  n_res_blocks: 6
  res_block_layers: 4
  dropout_frac: 0.0

embedding_dim: 128
include_sun: False
include_gsp_yield_history: False

#--------------------------------------------
